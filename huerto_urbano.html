document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"db7cdfd0-2f2c-4db2-8327-de24dc52a14f\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n  <style>/* ============================================================\n   COLOR · HUMAN STEM\n   Canonical palette from the Manual de Identidad (corrected hex).\n   Two institutional blues + four secondary accents + neutrals.\n   ============================================================ */\n:root {\n  /* ---- Institutional (primary) ---- */\n  --human-azul-oscuro: #1C224F; /* autoridad, confianza, conocimiento */\n  --human-azul-medio:  #375C8B; /* tecnología, bienestar, racionalidad */\n\n  /* ---- Secondary accents ---- */\n  --human-verde:   #7AC053; /* vida, compromiso ambiental, éxito */\n  --human-cyan:    #1EC3EA; /* tecnología, info, interacción digital */\n  --human-naranja: #ED853B; /* acción, energía, procesos activos */\n  --human-rojo:    #F05876; /* precisión, pasión, calidez, alerta */\n\n  /* ---- Institutional tint/shade ramps (UI states) ---- */\n  --human-azul-oscuro-900: #11163A;\n  --human-azul-oscuro-800: #1C224F;\n  --human-azul-oscuro-700: #283163;\n  --human-azul-medio-600:  #375C8B;\n  --human-azul-medio-500:  #4A72A6;\n  --human-azul-medio-100:  #E2EAF4;\n  --human-azul-medio-050:  #F1F5FA;\n\n  /* ---- Accent soft tints (backgrounds, chips) ---- */\n  --human-verde-soft:   #EAF6E1;\n  --human-cyan-soft:    #DEF6FC;\n  --human-naranja-soft: #FCEBDC;\n  --human-rojo-soft:    #FDE2E8;\n\n  /* ---- Neutrals ---- */\n  --human-tinta:       #1B1D24; /* texto principal */\n  --human-gris-texto:  #44464F; /* texto secundario */\n  --human-gris-tenue:  #6E7079; /* texto terciario, captions */\n  --human-blanco:      #FFFFFF;\n  --human-papel:       #FFFFFF; /* fondo base */\n  --human-gris-suave:  #F3F5F8; /* fondo de sección alterno */\n  --human-gris-nube:   #E7EBF1; /* fondo hundido / inputs */\n  --human-linea:       #DCE0E8; /* hairlines, bordes */\n  --human-linea-fuerte:#C2C8D4;\n\n  /* ============================================================\n     SEMANTIC ALIASES — reference these in components/UI.\n     ============================================================ */\n  /* Brand */\n  --color-brand:            var(--human-azul-oscuro);\n  --color-brand-strong:     var(--human-azul-oscuro-900);\n  --color-brand-secondary:  var(--human-azul-medio);\n\n  /* Surfaces */\n  --surface-page:    var(--human-papel);\n  --surface-subtle:  var(--human-gris-suave);\n  --surface-sunken:  var(--human-gris-nube);\n  --surface-card:    var(--human-blanco);\n  --surface-inverse: var(--human-azul-oscuro);\n\n  /* Text */\n  --text-strong:   var(--human-tinta);\n  --text-body:     var(--human-gris-texto);\n  --text-muted:    var(--human-gris-tenue);\n  --text-on-brand: var(--human-blanco);\n  --text-link:     var(--human-azul-medio);\n\n  /* Borders */\n  --border-subtle: var(--human-linea);\n  --border-strong: var(--human-linea-fuerte);\n  --border-brand:  var(--human-azul-oscuro);\n\n  /* Interactive (primary action = institutional blue) */\n  --action-primary:        var(--human-azul-oscuro);\n  --action-primary-hover:  var(--human-azul-oscuro-700);\n  --action-primary-active: var(--human-azul-oscuro-900);\n\n  /* Status / feedback (mapped to brand meaning) */\n  --status-success: var(--human-verde);\n  --status-success-soft: var(--human-verde-soft);\n  --status-info:    var(--human-cyan);\n  --status-info-soft: var(--human-cyan-soft);\n  --status-warning: var(--human-naranja);\n  --status-warning-soft: var(--human-naranja-soft);\n  --status-danger:  var(--human-rojo);\n  --status-danger-soft: var(--human-rojo-soft);\n\n  /* Focus ring */\n  --focus-ring: var(--human-azul-medio);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   TYPOGRAPHY · HUMAN STEM\n   Brand   : Gill Sans      → \"Hanken Grotesk\" (humanist substitute)\n   Technical: Century Gothic → \"Jost\"          (geometric substitute)\n   Body    : Arial (system, brand's secondary face)\n   NOTE: Gill Sans / Century Gothic are not free webfonts. The\n   substitutes mirror the humanist/geometric pairing. Swap the\n   --font-* stacks if you license the originals.\n   ============================================================ */\n:root {\n  /* ---- Families ---- */\n  --font-brand:     \"Gill Sans\", \"Gill Sans MT\", \"Hanken Grotesk\", system-ui, sans-serif;\n  --font-technical: \"Century Gothic\", \"Jost\", \"Hanken Grotesk\", system-ui, sans-serif;\n  --font-body:      Arial, \"Liberation Sans\", Helvetica, system-ui, sans-serif;\n  --font-mono:      ui-monospace, \"SF Mono\", Menlo, Consolas, monospace;\n\n  /* ---- Type scale (rem, 1rem = 16px base) ---- */\n  --text-2xs: 0.6875rem; /* 11px — micro labels */\n  --text-xs:  0.75rem;   /* 12px — captions, meta */\n  --text-sm:  0.875rem;  /* 14px — secondary UI */\n  --text-md:  1rem;      /* 16px — body base */\n  --text-lg:  1.125rem;  /* 18px — lead body */\n  --text-xl:  1.375rem;  /* 22px — h4 / card title */\n  --text-2xl: 1.75rem;   /* 28px — h3 */\n  --text-3xl: 2.25rem;   /* 36px — h2 */\n  --text-4xl: 3rem;      /* 48px — h1 */\n  --text-5xl: 4rem;      /* 64px — display */\n\n  /* ---- Weights ---- */\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n  --weight-black:    800;\n\n  /* ---- Line heights ---- */\n  --leading-tight:   1.12;\n  --leading-snug:    1.28;\n  --leading-normal:  1.5;\n  --leading-relaxed: 1.65;\n\n  /* ---- Letter spacing ---- */\n  --tracking-tight:  -0.01em;\n  --tracking-normal: 0;\n  --tracking-wide:   0.04em;\n  --tracking-caps:   0.12em; /* uppercase technical labels */\n\n  /* ---- Semantic roles ---- */\n  --font-display: var(--font-brand);    /* HUMAN, big impact titles */\n  --font-heading: var(--font-brand);    /* h1/h2 */\n  --font-subhead: var(--font-technical);/* technical subtitles, eyebrows */\n  --font-ui:      var(--font-technical);/* buttons, tabs, nav labels */\n}\n<\u002Fstyle>\n  <link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n  <link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n  <style>/* cyrillic-ext */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"ed01a8ed-a64d-4f75-b2b8-64e8eadd20ec\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"6ac3dd23-8821-4f0b-a6cd-ce61a73e909f\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"20fce487-feae-4692-b2c9-cbc8dfb26ed1\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"24f8e633-cbb5-425d-a7fc-ebd865fd3984\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"ed01a8ed-a64d-4f75-b2b8-64e8eadd20ec\") format('woff2');\n  unicode-range: U+04 5650-427b-9303-5eee51513b2c\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Jost';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"545a1ad2-0386-4c46-9bb9-36407033d3d8\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Jost';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"90b752cf-b35a-4f28-8713-0b71096d72a7\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <script src=\"4227e56a-d360-4f66-9f2c-fdd0297eb489\"><\u002Fscript>\n  <script src=\"8cce5546-1248-4850-9293-cd1412e73ed8\"><\u002Fscript>\n<\u002Fhelmet>\n<x-import component-from-global-scope=\"deck-stage\" from=\"9cb7ed42-94c6-4d26-9509-d7ca78129e33#/deck-stage.js\" width=\"1920\" height=\"1080\" hint-size=\"100%,100%\">\n\n  <section data-label=\"Portada\" data-speaker-notes=\"Bienvenida. HUMAN STEM presenta los huertos urbanos. La idea central: un huerto que crece de lo que normalmente tiramos. Invitar a la comunidad a imaginar un ciclo donde nada se desperdicia.\" style=\"height:100%;width:100%;box-sizing:border-box;background-color:#1B3522;background-image:linear-gradient(rgba(255,255,255,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.05) 1px,transparent 1px);background-size:46px 46px;font-family:Arial,Helvetica,sans-serif;color:#FFFFFF;padding:90px 110px;display:flex;flex-direction:column;justify-content:space-between;\">\n    <div style=\"display:flex;align-items:center;gap:14px;\">\n      <span style=\"font-family:'Hanken Grotesk',sans-serif;font-weight:800;font-size:26px;letter-spacing:-0.01em;color:#FFFFFF;\">HUMAN<\u002Fspan>\n      <span style=\"font-family:'Jost',sans-serif;font-weight:500;font-size:26px;letter-spacing:0.16em;color:#7AC053;\">STEM<\u002Fspan>\n      <span style=\"width:1px;height:24px;background:rgba(255,255,255,0.28);margin:0 6px;\"><\u002Fspan>\n      <span style=\"font-family:'Jost',sans-serif;font-size:20px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.7);\">Huertos urbanos<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"max-width:1180px;\">\n      <div style=\"font-family:'Jost',sans-serif;font-weight:600;font-size:24px;letter-spacing:0.2em;text-transform:uppercase;color:#7AC053;margin-bottom:30px;\">Ciencia · Comunidad · Ambiente<\u002Fdiv>\n      <h1 style=\"font-family:'Hanken Grotesk',sans-serif;font-weight:800;font-size:108px;line-height:1.02;letter-spacing:-0.02em;margin:0;color:#FFFFFF;\">Huertos urbanos<br><span style=\"color:#7AC053;\">que crecen de lo que tiramos.<\u002Fspan><\u002Fh1>\n      <div style=\"width:96px;height:5px;background:#C18A4E;border-radius:3px;margin:42px 0 30px;\"><\u002Fdiv>\n      <p style=\"font-size:27px;line-height:1.5;max-width:880px;margin:0;color:rgba(255,255,255,0.82);\">Convertimos los desechos orgánicos del día en alimento, cerrando un ciclo natural con lombrices, suelo vivo y manos de la comunidad.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;gap:14px;\">\n      <span style=\"font-family:'Jost',sans-serif;font-size:20px;letter-spacing:0.06em;color:#1B3522;background:#7AC053;padding:12px 22px;border-radius:999px;font-weight:600;\">Cero residuos<\u002Fspan>\n      <span style=\"font-family:'Jost',sans-serif;font-size:20px;letter-spacing:0.06em;color:#F0E5D7;background:rgba(193,138,78,0.22);border:1.5px solid rgba(193,138,78,0.55);padding:12px 22px;border-radius:999px;font-weight:600;\">Suelo vivo<\u002Fspan>\n      <span style=\"font-family:'Jost',sans-serif;font-size:20px;letter-spacing:0.06em;color:#F0E5D7;background:rgba(193,138,78,0.22);border:1.5px solid rgba(193,138,78,0.55);padding:12px 22px;border-radius:999px;font-weight:600;\">Independencia alimentaria<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"El ciclo\" data-speaker-notes=\"El corazón del proyecto: un ecosistema circular. Los desechos orgánicos del diario alimentan el lombricompostaje; las lombrices producen humus; el humus nutre el huerto; cosechamos alimento en casa; y los nuevos restos reinician el ciclo. Nada sale del sistema.\" style=\"height:100%;width:100%;box-sizing:border-box;background:#FAF6EE;font-family:Arial,Helvetica,sans-serif;color:#1B1D24;padding:84px 96px;display:flex;align-items:center;gap:56px;\">\n    <div style=\"flex:1;max-width:660px;\">\n      <div style=\"font-family:'Jost',sans-serif;font-weight:600;font-size:22px;letter-spacing:0.2em;text-transform:uppercase;color:#5E8C3A;margin-bottom:22px;\">El ciclo circular<\u002Fdiv>\n      <h2 style=\"font-family:'Hanken Grotesk',sans-serif;font-weight:800;font-size:62px;line-height:1.06;letter-spacing:-0.02em;margin:0 0 28px;color:#1B3522;\">Un sistema que no desperdicia nada<\u002Fh2>\n      <p style=\"font-size:24px;line-height:1.55;color:#4A463F;margin:0 0 26px;max-width:600px;\">En la naturaleza no existe la basura: lo que muere alimenta lo que crece. Reproducimos ese principio en casa, conectando la cocina con la tierra a través de las lombrices.<\u002Fp>\n      <p style=\"font-size:24px;line-height:1.55;color:#4A463F;margin:0;max-width:600px;\">Cada flecha es una transformación. El residuo de hoy es el nutriente de mañana, y la cosecha vuelve a empezar el ciclo.<\u002Fp>\n      <div style=\"display:flex;align-items:center;gap:12px;margin-top:36px;\">\n        <span style=\"display:inline-flex;width:36px;height:36px;align-items:center;justify-content:center;border-radius:999px;background:#1B3522;color:#7AC053;\"><i data-lucide=\"recycle\" width=\"20\" height=\"20\"><\u002Fi><\u002Fspan>\n        <span style=\"font-family:'Jost',sans-serif;font-size:18px;letter-spacing:0.04em;color:#5E3A22;font-weight:500;\">Un ciclo cerrado: cero residuos hacia afuera.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"flex-shrink:0;position:relative;width:720px;height:720px;\">\n      <svg viewBox=\"0 0 720 720\" width=\"720\" height=\"720\" style=\"position:absolute;inset:0;\">\n        <circle cx=\"360\" cy=\"360\" r=\"260\" fill=\"none\" stroke=\"#D8C3A6\" stroke-width=\"4\" stroke-dasharray=\"3 14\" stroke-linecap=\"round\"><\u002Fcircle>\n        <g fill=\"#5E8C3A\">\n          <polygon points=\"0,-10 17,0 0,10\" transform=\"translate(543.8,176.2) rotate(45)\"><\u002Fpolygon>\n          <polygon points=\"0,-10 17,0 0,10\" transform=\"translate(543.8,543.8) rotate(135)\"><\u002Fpolygon>\n          <polygon points=\"0,-10 17,0 0,10\" transform=\"translate(176.2,543.8) rotate(225)\"><\u002Fpolygon>\n          <polygon points=\"0,-10 17,0 0,10\" transform=\"translate(176.2,176.2) rotate(315)\"><\u002Fpolygon>\n        <\u002Fg>\n        <g font-family=\"Jost,sans-serif\" font-size=\"18\" font-weight=\"600\" fill=\"#8A5A34\" letter-spacing=\"0.04em\" text-anchor=\"middle\">\n          <text x=\"470\" y=\"250\">alimentan<\u002Ftext>\n          <text x=\"470\" y=\"476\">producen humus<\u002Ftext>\n          <text x=\"250\" y=\"476\">cosecha<\u002Ftext>\n          <text x=\"250\" y=\"250\">reinicia<\u002Ftext>\n        <\u002Fg>\n      <\u002Fsvg>\n\n      <div style=\"position:absolute;left:285px;top:285px;width:150px;height:150px;border-radius:999px;background:#1B3522;color:#7AC053;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;box-shadow:0 8px 24px rgba(27,53,34,0.28);\">\n        <i data-lucide=\"recycle\" width=\"40\" height=\"40\"><\u002Fi>\n        <span style=\"font-family:'Jost',sans-serif;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:#FFFFFF;\">Ciclo<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"position:absolute;left:285px;top:25px;width:150px;height:150px;border-radius:999px;background:#FFFFFF;border:2.5px solid #5E3A22;box-shadow:6px 6px 0 #C18A4E;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;\">\n        <i data-lucide=\"apple\" width=\"40\" height=\"40\" style=\"color:#8A5A34;\"><\u002Fi>\n        <span style=\"font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:16px;color:#1B3522;text-align:center;line-height:1.1;\">Desechos<br>orgánicos<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"position:absolute;left:545px;top:285px;width:150px;height:150px;border-radius:999px;background:#FFFFFF;border:2.5px solid #5E3A22;box-shadow:6px 6px 0 #C18A4E;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;\">\n        <i data-lucide=\"bug\" width=\"40\" height=\"40\" style=\"color:#8A5A34;\"><\u002Fi>\n        <span style=\"font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:16px;color:#1B3522;text-align:center;line-height:1.1;\">Lombri-<br>compostaje<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"position:absolute;left:285px;top:545px;width:150px;height:150px;border-radius:999px;background:#FFFFFF;border:2.5px solid #5E3A22;box-shadow:6px 6px 0 #7AC053;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;\">\n        <i data-lucide=\"sprout\" width=\"40\" height=\"40\" style=\"color:#5E8C3A;\"><\u002Fi>\n        <span style=\"font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:16px;color:#1B3522;text-align:center;line-height:1.1;\">Huerto<br>urbano<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"position:absolute;left:25px;top:285px;width:150px;height:150px;border-radius:999px;background:#FFFFFF;border:2.5px solid #5E3A22;box-shadow:6px 6px 0 #7AC053;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;\">\n        <i data-lucide=\"carrot\" width=\"40\" height=\"40\" style=\"color:#5E8C3A;\"><\u002Fi>\n        <span style=\"font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:16px;color:#1B3522;text-align:center;line-height:1.1;\">Alimento<br>en casa<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Las etapas\" data-speaker-notes=\"Recorrido por las cuatro etapas, en lenguaje sencillo. Cada ficha es un paso del ciclo. Enfatizar que cualquier hogar puede empezar: solo hace falta separar lo orgánico.\" style=\"height:100%;width:100%;box-sizing:border-box;background:#FAF6EE;font-family:Arial,Helvetica,sans-serif;color:#1B1D24;padding:84px 96px;display:flex;flex-direction:column;\">\n    <div style=\"margin-bottom:48px;\">\n      <div style=\"font-family:'Jost',sans-serif;font-weight:600;font-size:22px;letter-spacing:0.2em;text-transform:uppercase;color:#5E8C3A;margin-bottom:18px;\">Cómo funciona, paso a paso<\u002Fdiv>\n      <h2 style=\"font-family:'Hanken Grotesk',sans-serif;font-weight:800;font-size:58px;line-height:1.05;letter-spacing:-0.02em;margin:0;color:#1B3522;\">De la cocina a la cosecha<\u002Fh2>\n    <\u002Fdiv>\n\n    <div style=\"flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:28px;align-items:stretch;\">\n      <div style=\"background:#FFFFFF;border:2.5px solid #5E3A22;box-shadow:6px 6px 0 #C18A4E;border-radius:10px;padding:34px 30px;display:flex;flex-direction:column;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;\">\n          <span style=\"display:inline-flex;width:62px;height:62px;align-items:center;justify-content:center;border-radius:14px;background:#F0E5D7;color:#8A5A34;\"><i data-lucide=\"apple\" width=\"32\" height=\"32\"><\u002Fi><\u002Fspan>\n          <span style=\"font-family:'Jost',sans-serif;font-weight:600;font-size:40px;color:#E3D3BC;line-height:1;\">01<\u002Fspan>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:25px;line-height:1.12;margin:0 0 14px;color:#1B3522;\">Desechos orgánicos del diario<\u002Fh3>\n        <p style=\"font-size:18px;line-height:1.5;color:#4A463F;margin:0;\">Cáscaras, restos de verdura y posos de café que antes iban a la basura se separan en la cocina. Son la materia prima del ciclo.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#FFFFFF;border:2.5px solid #5E3A22;box-shadow:6px 6px 0 #C18A4E;border-radius:10px;padding:34px 30px;display:flex;flex-direction:column;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;\">\n          <span style=\"display:inline-flex;width:62px;height:62px;align-items:center;justify-content:center;border-radius:14px;background:#F0E5D7;color:#8A5A34;\"><i data-lucide=\"bug\" width=\"32\" height=\"32\"><\u002Fi><\u002Fspan>\n          <span style=\"font-family:'Jost',sans-serif;font-weight:600;font-size:40px;color:#E3D3BC;line-height:1;\">02<\u002Fspan>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:25px;line-height:1.12;margin:0 0 14px;color:#1B3522;\">Lombricompostaje<\u002Fh3>\n        <p style=\"font-size:18px;line-height:1.5;color:#4A463F;margin:0;\">Las lombrices digieren esos restos y los convierten en humus, un abono oscuro y rico en nutrientes que la tierra absorbe con facilidad.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#FFFFFF;border:2.5px solid #5E3A22;box-shadow:6px 6px 0 #7AC053;border-radius:10px;padding:34px 30px;display:flex;flex-direction:column;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;\">\n          <span style=\"display:inline-flex;width:62px;height:62px;align-items:center;justify-content:center;border-radius:14px;background:#EAF6E1;color:#5E8C3A;\"><i data-lucide=\"sprout\" width=\"32\" height=\"32\"><\u002Fi><\u002Fspan>\n          <span style=\"font-family:'Jost',sans-serif;font-weight:600;font-size:40px;color:#CDE6BC;line-height:1;\">03<\u002Fspan>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:25px;line-height:1.12;margin:0 0 14px;color:#1B3522;\">Huerto urbano<\u002Fh3>\n        <p style=\"font-size:18px;line-height:1.5;color:#4A463F;margin:0;\">El humus nutre un suelo vivo donde crecen hortalizas y hierbas, sin necesidad de fertilizantes sintéticos ni químicos.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#FFFFFF;border:2.5px solid #5E3A22;box-shadow:6px 6px 0 #7AC053;border-radius:10px;padding:34px 30px;display:flex;flex-direction:column;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;\">\n          <span style=\"display:inline-flex;width:62px;height:62px;align-items:center;justify-content:center;border-radius:14px;background:#EAF6E1;color:#5E8C3A;\"><i data-lucide=\"carrot\" width=\"32\" height=\"32\"><\u002Fi><\u002Fspan>\n          <span style=\"font-family:'Jost',sans-serif;font-weight:600;font-size:40px;color:#CDE6BC;line-height:1;\">04<\u002Fspan>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:25px;line-height:1.12;margin:0 0 14px;color:#1B3522;\">Alimento e independencia<\u002Fh3>\n        <p style=\"font-size:18px;line-height:1.5;color:#4A463F;margin:0;\">Cosechamos comida fresca en casa. Los nuevos restos de esa cosecha reinician el ciclo: la independencia alimentaria se vuelve cotidiana.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Súmate\" data-speaker-notes=\"Cierre y llamado a la acción. El proyecto es replicable en cualquier hogar o colonia. Invitar a vecinos a sumarse como voluntarios: separar lo orgánico, montar una lombricomposta comunitaria y compartir la cosecha.\" style=\"height:100%;width:100%;box-sizing:border-box;background-color:#1B3522;background-image:linear-gradient(rgba(255,255,255,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.05) 1px,transparent 1px);background-size:46px 46px;font-family:Arial,Helvetica,sans-serif;color:#FFFFFF;padding:90px 110px;display:flex;flex-direction:column;justify-content:space-between;\">\n    <div style=\"font-family:'Jost',sans-serif;font-weight:600;font-size:24px;letter-spacing:0.2em;text-transform:uppercase;color:#7AC053;\">Por qué importa<\u002Fdiv>\n\n    <div style=\"display:flex;align-items:flex-end;gap:72px;\">\n      <div style=\"flex:1;max-width:780px;\">\n        <h2 style=\"font-family:'Hanken Grotesk',sans-serif;font-weight:800;font-size:74px;line-height:1.04;letter-spacing:-0.02em;margin:0;color:#FFFFFF;\">Cada cáscara puede<br><span style=\"color:#7AC053;\">volver a la tierra.<\u002Fspan><\u002Fh2>\n        <p style=\"font-size:25px;line-height:1.5;color:rgba(255,255,255,0.82);margin:30px 0 0;\">Un gesto pequeño en cada cocina, multiplicado por toda una colonia, cierra el ciclo y nos acerca a producir parte de lo que comemos.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"flex-shrink:0;width:430px;display:flex;flex-direction:column;gap:20px;\">\n        <div style=\"display:flex;align-items:flex-start;gap:16px;\">\n          <span style=\"flex-shrink:0;display:inline-flex;width:44px;height:44px;align-items:center;justify-content:center;border-radius:11px;background:rgba(193,138,78,0.22);border:1.5px solid rgba(193,138,78,0.55);color:#E6C79E;\"><i data-lucide=\"trash-2\" width=\"22\" height=\"22\"><\u002Fi><\u002Fspan>\n          <span style=\"font-size:20px;line-height:1.4;color:rgba(255,255,255,0.9);padding-top:4px;\">Menos residuos hacia el relleno sanitario.<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:flex-start;gap:16px;\">\n          <span style=\"flex-shrink:0;display:inline-flex;width:44px;height:44px;align-items:center;justify-content:center;border-radius:11px;background:rgba(122,192,83,0.18);border:1.5px solid rgba(122,192,83,0.5);color:#9BD47A;\"><i data-lucide=\"leaf\" width=\"22\" height=\"22\"><\u002Fi><\u002Fspan>\n          <span style=\"font-size:20px;line-height:1.4;color:rgba(255,255,255,0.9);padding-top:4px;\">Suelo vivo y fértil, sin químicos.<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:flex-start;gap:16px;\">\n          <span style=\"flex-shrink:0;display:inline-flex;width:44px;height:44px;align-items:center;justify-content:center;border-radius:11px;background:rgba(122,192,83,0.18);border:1.5px solid rgba(122,192,83,0.5);color:#9BD47A;\"><i data-lucide=\"users\" width=\"22\" height=\"22\"><\u002Fi><\u002Fspan>\n          <span style=\"font-size:20px;line-height:1.4;color:rgba(255,255,255,0.9);padding-top:4px;\">Alimento fresco y comunidad alrededor del huerto.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n      <div style=\"display:inline-flex;align-items:center;gap:14px;background:#7AC053;color:#143019;padding:18px 34px;border-radius:999px;font-family:'Jost',sans-serif;font-weight:600;font-size:23px;letter-spacing:0.04em;\">\n        Súmate al huerto de tu colonia\n        <i data-lucide=\"arrow-right\" width=\"24\" height=\"24\"><\u002Fi>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:12px;\">\n        <span style=\"font-family:'Hanken Grotesk',sans-serif;font-weight:800;font-size:22px;color:#FFFFFF;\">HUMAN<\u002Fspan>\n        <span style=\"font-family:'Jost',sans-serif;font-weight:500;font-size:22px;letter-spacing:0.16em;color:#7AC053;\">STEM<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fx-import>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    this._drawIcons();\n  }\n  _drawIcons(tries = 0) {\n    var converted = document.querySelectorAll('svg.lucide').length;\n    var pending = document.querySelectorAll('i[data-lucide]').length;\n    if (window.lucide && typeof window.lucide.createIcons === 'function') {\n      window.lucide.createIcons();\n      pending = document.querySelectorAll('i[data-lucide]').length;\n      converted = document.querySelectorAll('svg.lucide').length;\n    }\n    // Keep ticking on a fixed schedule: the deck slides are slotted in a moment\n    // after mount, so \"no tags yet\" (pending===0 && converted===0) must NOT stop\n    // the loop. Only stop once icons have actually been drawn and none remain.\n    var done = converted > 0 && pending === 0;\n    if (!done && tries < 60) {\n      setTimeout(() => this._drawIcons(tries + 1), 120);\n    }\n  }\n  renderVals() {\n    return {};\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
